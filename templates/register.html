{% extends "index.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-user-plus"></i> Register for Secure Communication</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <input type="text" class="form-control" id="username" name="username" 
                               placeholder="Choose a unique username" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Create a strong password" required>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <div class="text-center mt-3">
                    <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
                </div>

                <div class="mt-4">
                    <h6>Security Features:</h6>
                    <ul class="list-unstyled">
                        <li><i class="fas fa-shield-alt text-success"></i> End-to-end encryption</li>
                        <li><i class="fas fa-eye-slash text-info"></i> Steganographic hiding</li>
                        <li><i class="fas fa-lock text-warning"></i> Password protection</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
