<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Steganography</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn-blockchain { background: linear-gradient(45deg, #667eea, #764ba2); border: none; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center text-white mb-4">
            <h1>🔗 Blockchain Steganography</h1>
            <p>Hide messages in images + Store keys on Ethereum</p>
        </div>

        <!-- Wallet Info -->
        <div class="card mb-4">
            <div class="card-body">
                <h5>💰 Wallet Info</h5>
                <p><strong>Address:</strong> <code>{{ wallet }}</code></p>
                <p><strong>Balance:</strong> {{ balance }} ETH</p>
                <p><strong>Network:</strong> <span class="badge bg-success">{{ network }}</span></p>
            </div>
        </div>

        <div class="row">
            <!-- Hide Message -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>🔒 Hide Message</h5>
                        <form id="hideForm" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label>Cover Image</label>
                                <input type="file" class="form-control" name="image" accept="image/*" required>
                            </div>
                            <div class="mb-3">
                                <label>Secret Message</label>
                                <textarea class="form-control" name="message" rows="3" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" class="form-control" name="password" required>
                            </div>
                            <div class="mb-3">
                                <label>Receiver Address (optional)</label>
                                <input type="text" class="form-control" name="receiver" placeholder="{{ wallet }}">
                            </div>
                            <button type="submit" class="btn btn-blockchain text-white w-100">Hide & Store on Blockchain</button>
                        </form>
                        <div id="hideResult" class="mt-3"></div>
                    </div>
                </div>
            </div>

            <!-- Extract Message -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>🔓 Extract Message</h5>
                        <form id="extractForm" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label>Stego Image</label>
                                <input type="file" class="form-control" name="image" accept="image/*" required>
                            </div>
                            <div class="mb-3">
                                <label>Transaction Hash</label>
                                <input type="text" class="form-control" name="tx_hash" placeholder="0x..." required>
                            </div>
                            <button type="submit" class="btn btn-blockchain text-white w-100">Extract from Blockchain</button>
                        </form>
                        <div id="extractResult" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('hideForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const result = document.getElementById('hideResult');
            result.innerHTML = '<div class="alert alert-info">Processing...</div>';
            
            const res = await fetch('/hide_blockchain', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.success) {
                result.innerHTML = `
                    <div class="alert alert-success">
                        <strong>✅ Success!</strong><br>
                        <a href="/download/${data.stego_image}" class="btn btn-sm btn-success mt-2">Download Image</a><br>
                        <small>TX: <a href="${data.explorer_url}" target="_blank">${data.tx_hash}</a></small>
                    </div>`;
            } else {
                result.innerHTML = `<div class="alert alert-danger">❌ ${data.error}</div>`;
            }
        };

        document.getElementById('extractForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const result = document.getElementById('extractResult');
            result.innerHTML = '<div class="alert alert-info">Processing...</div>';
            
            const res = await fetch('/extract_blockchain', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.success) {
                result.innerHTML = `
                    <div class="alert alert-success">
                        <strong>✅ Message:</strong><br>
                        <p>${data.message}</p>
                        <small>From: ${data.sender}</small>
                    </div>`;
            } else {
                result.innerHTML = `<div class="alert alert-danger">❌ ${data.error}</div>`;
            }
        };
    </script>
</body>
</html>
