<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Steganography + Blockchain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .btn-send { background: linear-gradient(45deg, #667eea, #764ba2); border: none; }
        .message-item { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center text-white mb-4">
            <h1>🔐 Network Steganography + Blockchain</h1>
            <p>Encrypted messages over network + Keys on Ethereum</p>
        </div>

        <!-- Wallet Info -->
        <div class="card">
            <div class="card-body">
                <h5>💰 Wallet</h5>
                <p><strong>Address:</strong> <code>{{ wallet }}</code></p>
                <p><strong>Balance:</strong> <span id="balance">{{ balance }}</span> ETH</p>
                <button class="btn btn-sm btn-primary" onclick="updateBalance()">Refresh</button>
            </div>
        </div>

        <div class="row">
            <!-- Send Message -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>📤 Send Message</h5>
                        <div class="mb-3">
                            <label>Message</label>
                            <textarea id="message" class="form-control" rows="3" placeholder="Enter secret message"></textarea>
                        </div>
                        <div class="mb-3">
                            <label>Receiver Host</label>
                            <input type="text" id="host" class="form-control" value="localhost">
                        </div>
                        <div class="mb-3">
                            <label>Receiver Port</label>
                            <input type="number" id="port" class="form-control" value="9999">
                        </div>
                        <button class="btn btn-send text-white w-100" onclick="sendMessage()">Send Encrypted Message</button>
                        <div id="sendResult" class="mt-3"></div>
                    </div>
                </div>
            </div>

            <!-- Received Messages -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>📥 Received Messages</h5>
                        <button class="btn btn-sm btn-primary mb-3" onclick="loadMessages()">Refresh</button>
                        <div id="messages"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const message = document.getElementById('message').value;
            const host = document.getElementById('host').value;
            const port = document.getElementById('port').value;
            const result = document.getElementById('sendResult');
            
            if (!message) {
                result.innerHTML = '<div class="alert alert-warning">Enter a message</div>';
                return;
            }
            
            result.innerHTML = '<div class="alert alert-info">Encrypting and sending...</div>';
            
            try {
                const res = await fetch('/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message, host, port})
                });
                
                const data = await res.json();
                
                if (data.success) {
                    result.innerHTML = `
                        <div class="alert alert-success">
                            <strong>✅ Sent!</strong><br>
                            <small>TX: <a href="${data.explorer_url}" target="_blank">${data.tx_hash.substring(0,16)}...</a></small>
                        </div>`;
                    document.getElementById('message').value = '';
                    updateBalance();
                } else {
                    result.innerHTML = `<div class="alert alert-danger">❌ ${data.error}</div>`;
                }
            } catch (e) {
                result.innerHTML = `<div class="alert alert-danger">❌ ${e.message}</div>`;
            }
        }

        async function loadMessages() {
            const res = await fetch('/received');
            const data = await res.json();
            const container = document.getElementById('messages');
            
            if (data.messages.length === 0) {
                container.innerHTML = '<p class="text-muted">No messages yet</p>';
                return;
            }
            
            container.innerHTML = data.messages.map(msg => `
                <div class="message-item">
                    <strong>📩 ${msg.message}</strong><br>
                    <small>TX: ${msg.tx_hash.substring(0,16)}...</small><br>
                    <small>Encrypted: ${msg.encrypted}</small>
                </div>
            `).reverse().join('');
        }

        async function updateBalance() {
            const res = await fetch('/balance');
            const data = await res.json();
            document.getElementById('balance').textContent = data.balance;
        }

        // Auto-refresh messages
        setInterval(loadMessages, 3000);
        loadMessages();
    </script>
</body>
</html>
