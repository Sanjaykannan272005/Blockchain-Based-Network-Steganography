<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Test</title>
</head>
<body>
    <h1>Password Strength Test</h1>
    <input type="password" id="password" placeholder="Enter password">
    <div id="result"></div>
    
    <script>
    document.getElementById('password').addEventListener('input', function() {
        const password = this.value;
        const resultDiv = document.getElementById('result');
        
        if (password.length === 0) {
            resultDiv.innerHTML = '';
            return;
        }
        
        fetch('/check_password_strength', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({password: password})
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                resultDiv.innerHTML = 'Error: ' + data.error;
            } else {
                resultDiv.innerHTML = `
                    <p>Score: ${data.score}/100</p>
                    <p>Strength: ${data.strength}</p>
                    <p>Feedback: ${data.feedback.join(', ')}</p>
                `;
            }
        })
        .catch(error => {
            resultDiv.innerHTML = 'Fetch error: ' + error;
        });
    });
    </script>
</body>
</html>
